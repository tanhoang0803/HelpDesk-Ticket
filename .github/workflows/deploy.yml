name: CI/CD — Railway + Vercel

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# ─────────────────────────────────────────────
# CI — Backend (lint + build check)
# ─────────────────────────────────────────────
jobs:
  ci-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # CI — Frontend (type-check + build)
  # ─────────────────────────────────────────────
  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes type-check + lint)
        run: npm run build

  # ─────────────────────────────────────────────
  # CD — Deploy Backend to Railway
  # Only on push to master, after CI passes
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Railway deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}")
          echo "Railway response: $STATUS"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "Railway deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "Railway deploy triggered successfully"

  # ─────────────────────────────────────────────
  # CD — Deploy Frontend to Vercel
  # Only on push to master, after CI passes
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Vercel deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $STATUS"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "Vercel deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "Vercel deploy triggered successfully"
