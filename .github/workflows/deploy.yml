name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Backend ───────────────────────────────────────
  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk_secret
          POSTGRES_DB: helpdesk_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U helpdesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f backend/package.json         && echo "✅ backend/package.json"        || (echo "❌ backend/package.json missing"        && exit 1)
          test -f backend/prisma/schema.prisma && echo "✅ prisma/schema.prisma"        || (echo "❌ prisma/schema.prisma missing"        && exit 1)
          test -f backend/src/main.ts          && echo "✅ backend/src/main.ts"         || (echo "❌ backend/src/main.ts missing"         && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://helpdesk:helpdesk_secret@localhost:5432/helpdesk_db
        run: npx prisma migrate deploy && echo "✅ Database migrations OK"

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://helpdesk:helpdesk_secret@localhost:5432/helpdesk_db
          JWT_SECRET: ci-secret
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          NODE_ENV: test
        run: npm run test -- --passWithNoTests --forceExit && echo "✅ Tests passed"

      - name: Build
        working-directory: backend
        run: npm run build && echo "✅ Backend build OK"

  # ── Job 2: Frontend ──────────────────────────────────────
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f frontend/package.json    && echo "✅ frontend/package.json"   || (echo "❌ frontend/package.json missing"   && exit 1)
          test -f frontend/next.config.mjs && echo "✅ next.config.mjs"         || (echo "❌ next.config.mjs missing"         && exit 1)
          test -d frontend/src             && echo "✅ frontend/src/"            || (echo "❌ frontend/src/ missing"            && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true          # report errors but don't block

      - name: Build (type-check + compile)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build && echo "✅ Frontend build OK"
