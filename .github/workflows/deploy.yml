name: CI — Deploy to Railway & Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:       # allow manual trigger from Actions tab

# Only one deployment runs at a time; queued runs wait, not cancel
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: Validate ─────────────────────────────────────
  validate:
    name: Validate Backend & Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking project files..."
          test -f backend/package.json          && echo "✅ backend/package.json"          || (echo "❌ backend/package.json missing"          && exit 1)
          test -f backend/prisma/schema.prisma  && echo "✅ backend/prisma/schema.prisma"  || (echo "❌ backend/prisma/schema.prisma missing"  && exit 1)
          test -f frontend/package.json         && echo "✅ frontend/package.json"         || (echo "❌ frontend/package.json missing"         && exit 1)
          test -f frontend/next.config.mjs      && echo "✅ frontend/next.config.mjs"      || (echo "❌ frontend/next.config.mjs missing"      && exit 1)
          echo "All required files present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Backend ──────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build && echo "✅ Backend build OK"

      # ── Frontend ─────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (type-check + lint included)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build && echo "✅ Frontend build OK"

  # ── Job 2: Deploy ────────────────────────────────────────
  deploy:
    name: Deploy to Railway & Vercel
    runs-on: ubuntu-latest
    needs: validate          # only deploy if validate passes

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Deploy backend → Railway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}")
          echo "Railway response: $STATUS"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ Railway deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "✅ Railway deploy triggered"

      - name: Deploy frontend → Vercel
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $STATUS"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ Vercel deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "✅ Vercel deploy triggered"

      - name: Print live URL
        run: echo "🚀 Live at ${{ vars.PRODUCTION_URL }}"
