# Railway reads this file from the repo root automatically.
# No UI "Root Directory" setting needed.
# dockerfilePath tells Railway which Dockerfile to use;
# Railway uses that file's directory (backend/) as the Docker build context.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand            = "sh start.sh"
healthcheckPath         = "/api/health"
healthcheckTimeout      = 300
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
