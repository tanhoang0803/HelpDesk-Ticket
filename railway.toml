# Railway reads this file from the repo root automatically.
# startCommand runs INSIDE the already-built container, so no file
# copying from the build context is needed.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand            = "npx prisma migrate deploy && (npx prisma db seed || true) && node dist/main"
healthcheckPath         = "/api/health"
healthcheckTimeout      = 300
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
